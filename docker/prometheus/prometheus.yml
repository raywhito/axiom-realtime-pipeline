global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: producer
    static_configs:
      - targets: ["producer:8001"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:8002"]

  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
